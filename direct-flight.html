document.addEventListener("DOMContentLoaded", () => {
	const SESSION_KEY = "webjet_selected_route";
	const MAX_DISTANCE_KM = 200;
	const FALLBACK_ROUTE = "syd-to-chc";

	const codeToLabel = {
		"syd-to-chc": "SYD to CHC",
		"mel-to-chc": "MEL to CHC",
		"bne-to-chc": "BNE to CHC",
		"ool-to-chc": "OOL to CHC",
		"cns-to-chc": "CNS to CHC"
	};

	const cityMap = {
		"syd": "Sydney",
		"mel": "Melbourne",
		"bne": "Brisbane",
		"ool": "Gold Coast",
		"cns": "Cairns",
		"chc": "Christchurch"
	};

	const citiesCoordinates = {
		"sydney": {
			lat: -33.8688,
			lon: 151.2093
		},
		"melbourne": {
			lat: -37.8136,
			lon: 144.9631
		},
		"brisbane": {
			lat: -27.4698,
			lon: 153.0251
		},
		"gold coast": {
			lat: -28.1667,
			lon: 153.5333
		},
		"cairns": {
			lat: -16.9186,
			lon: 145.7781
		},
	};

	const cityToCodeMap = {
		"sydney": "syd-to-chc",
		"melbourne": "mel-to-chc",
		"brisbane": "bne-to-chc",
		"gold coast": "ool-to-chc",
		"coolangatta": "ool-to-chc",
		"cairns": "cns-to-chc",
	};

	const customDropdown = document.getElementById("webjet-dropdown");
	const customText = document.getElementById("webjet-dropdown-text");
	const bookNowButton = document.getElementById("webjet-book-now");

	if (!customDropdown || !customText) return;

	customDropdown.style.position = "relative";

	const nativeSelect = document.createElement("select");

	nativeSelect.setAttribute("aria-label", "Select departure city");

	const defaultOption = document.createElement("option");
	defaultOption.text = "Where from?";
	defaultOption.value = "";
	defaultOption.disabled = true;
	defaultOption.selected = true;
	nativeSelect.appendChild(defaultOption);

	Object.keys(codeToLabel).forEach((code) => {
		const option = document.createElement("option");
		option.value = code;
		option.text = codeToLabel[code];
		nativeSelect.appendChild(option);
	});

	Object.assign(nativeSelect.style, {
		position: "absolute",
		top: "0",
		left: "0",
		width: "100%",
		height: "100%",
		opacity: "0",
		cursor: "pointer",
		zIndex: "10",
		appearance: "none",
		"-webkit-appearance": "none"
	});

	customDropdown.appendChild(nativeSelect);

	function updateWebjetLink(routeCode) {
		if (!bookNowButton || !routeCode) return;

		const parts = routeCode.split("-to-");
		if (parts.length !== 2) return;

		const fromCode = parts[0].toUpperCase();
		const toCode = parts[1].toUpperCase();

		const today = new Date();
		const tomorrow = new Date(today);
		tomorrow.setDate(today.getDate() + 1);

		const year = tomorrow.getFullYear();
		const month = (tomorrow.getMonth() + 1).toString().padStart(2, "0");
		const day = tomorrow.getDate().toString().padStart(2, "0");
		const dateStr = `${year}${month}${day}`;

		const fromName = cityMap[parts[0].toLowerCase()] || "Sydney";
		const toName = cityMap[parts[1].toLowerCase()] || "Christchurch";

		const baseURL = "https://services.webjet.com.au/web/flights/matrix/";
		const oneWayParam = `${fromCode}-${fromCode}-${toCode}-${toCode}-${dateStr}`;

		const params = new URLSearchParams({
			Adults: "1",
			Children: "0",
			Infants: "0",
			TravelClass: "Economy",
			GeoCategory: "TransTasman",
			TripType: "Oneway",
			OneWay: oneWayParam,
			CityFrom: fromName,
			CityTo: toName,
			CityCodeFrom: fromCode,
			CityCodeTo: toCode
		});

		bookNowButton.href = `${baseURL}?${params.toString()}`;
	}

	function setRoute(code, saveToSession = true) {
		if (codeToLabel[code]) {
			nativeSelect.value = code;
			customText.textContent = codeToLabel[code];
			updateWebjetLink(code);
			if (saveToSession) sessionStorage.setItem(SESSION_KEY, code);
		}
	}

	nativeSelect.addEventListener("change", (e) => {
		const selectedCode = e.target.value;
		customText.textContent = e.target.options[e.target.selectedIndex].text;
		sessionStorage.setItem(SESSION_KEY, selectedCode);
		updateWebjetLink(selectedCode);
	});

	function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
		const R = 6371;
		const dLat = (lat2 - lat1) * (Math.PI / 180);
		const dLon = (lon2 - lon1) * (Math.PI / 180);
		const a =
			Math.sin(dLat / 2) * Math.sin(dLat / 2) +
			Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) *
			Math.sin(dLon / 2) * Math.sin(dLon / 2);
		const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
		return R * c;
	}

	const storedRoute = sessionStorage.getItem(SESSION_KEY);

	if (storedRoute && codeToLabel[storedRoute]) {
		setRoute(storedRoute, false);
	} else {
		fetch("https://pro.ip-api.com/json/?fields=61439&key=3rxukZrZ9IgP9hB")
			.then(response => response.json())
			.then(data => {
				if (data.status === "success") {
					let closestCity = null;
					let minDistance = Infinity;

					for (const [city, coords] of Object.entries(citiesCoordinates)) {
						const distance = getDistanceFromLatLonInKm(data.lat, data.lon, coords.lat, coords.lon);
						if (distance < minDistance) {
							minDistance = distance;
							closestCity = city;
						}
					}

					if (closestCity && minDistance <= MAX_DISTANCE_KM) {
						setRoute(cityToCodeMap[closestCity], true);
					} else {
						setRoute(FALLBACK_ROUTE, true);
					}
				} else {
					setRoute(FALLBACK_ROUTE, true);
				}
			})
			.catch(() => setRoute(FALLBACK_ROUTE, true));
	}
});
</script></div><div class="default-code-embed w-embed w-script"><script>
document.addEventListener("DOMContentLoaded", () => {
  const section = document.getElementById("book-now");
  const bgImage = document.getElementById("webjet-media-bg");

  if (!section || !bgImage) return;

  // 1. Setup the image styles to allow movement
  // We make the image taller (130%) and shift it up (-15%) to center it initially.
  Object.assign(bgImage.style, {
    height: "130%",
    top: "-15%",
    position: "absolute",
    left: "0",
    width: "100%",
    objectFit: "cover",
    zIndex: "0",
    willChange: "transform", // Optimizes performance for the browser
    inset: "auto" // Overrides the CSS 'inset: 0%' which locks the image
  });

  // 2. Parallax Logic
  function updateParallax() {
    // Get the current scroll position
    const scrollTop = window.scrollY;
    
    // Get section geometry
    const sectionTop = section.offsetTop;
    const sectionHeight = section.offsetHeight;
    const windowHeight = window.innerHeight;

    // Check if the section is currently in the viewport (with a small buffer)
    if (scrollTop + windowHeight > sectionTop && scrollTop < sectionTop + sectionHeight) {
      
      // Calculate how far we have scrolled relative to the section's top
      const distance = scrollTop - sectionTop;

      // Speed factor: 0.2 means the image moves at 20% speed of the scroll
      // Positive moves down (creating depth), Negative moves up.
      const speed = 0.2; 
      
      const yPos = distance * speed;

      // Apply the transformation
      bgImage.style.transform = `translate3d(0, ${yPos}px, 0)`;
    }
  }

  // 3. Event Listener with RequestAnimationFrame for performance
  window.addEventListener("scroll", () => {
    requestAnimationFrame(updateParallax);
  });

  // Initial trigger to set position on load
  updateParallax();
});
</script></div></section></div>
